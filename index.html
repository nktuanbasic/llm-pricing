<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LLM API Pricing — Realtime</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;padding:20px}
.header{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
h1{font-size:22px;color:#f8fafc}
.sub{color:#94a3b8;font-size:13px;margin-bottom:16px}
.sub .updated{color:#64748b;font-size:11px}
.update-panel{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:12px 16px;background:#1e293b;border-radius:12px;margin-bottom:16px;border:1px solid #334155}
.update-panel label{font-size:13px;color:#94a3b8;white-space:nowrap}
.update-panel input[type=password]{flex:1;min-width:200px;padding:8px 12px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:13px;outline:none}
.update-panel input[type=password]:focus{border-color:#6366f1}
.update-panel button{padding:8px 20px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.btn-update{background:#6366f1;color:#fff}
.btn-update:hover{background:#4f46e5}
.btn-update:disabled{background:#475569;color:#94a3b8;cursor:not-allowed}
.update-status{font-size:12px;color:#94a3b8}
.update-status.error{color:#f87171}
.update-status.ok{color:#34d399}
.update-status.spin{color:#6366f1}
.spin::before{content:"\u21bb";display:inline-block;animation:spin 1s linear infinite;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center}
.filters input,.filters select{padding:7px 12px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;font-size:13px;outline:none}
.filters input:focus,.filters select:focus{border-color:#3b82f6}
.filters input{width:180px}
.filters select{cursor:pointer}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
.badge-budget{background:#065f46;color:#6ee7b7}
.badge-mid{background:#1e40af;color:#93c5fd}
.badge-premium{background:#7c2d12;color:#fdba74}
.badge-ultra{background:#450a0a;color:#fca5a5}
.badge-free{background:#1e1b4b;color:#c4b5fd}
.count{font-size:13px;color:#94a3b8;margin-left:auto}
.wrap{overflow-x:auto;border-radius:12px;border:1px solid #1e293b}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:1100px}
thead{position:sticky;top:0;z-index:2}
th{padding:10px 8px;background:#1e293b;color:#94a3b8;font-weight:600;text-align:center;cursor:pointer;white-space:nowrap;border-bottom:2px solid #334155;user-select:none}
th:hover{color:#f8fafc}
th .sort{opacity:0.3;margin-left:3px}
th.active .sort{opacity:1;color:#3b82f6}
th:first-child{padding-left:14px;text-align:left}
td{padding:9px 8px;text-align:center;border-bottom:1px solid #1e293b;vertical-align:middle}
td:first-child{padding-left:14px;font-weight:600;text-align:left}
tr.rec td{background:#f59e0b08}
tr.rec td:first-child{color:#fbbf24}
tr:hover td{background:#1e293b40}
.row-budget td{background:#065f4608}
.row-mid td{background:#1e40af08}
.row-premium td{background:#7c2d1208}
.row-ultra td{background:#450a0a08}
.row-free td{background:#1e1b4b08}
.hidden{display:none!important}
.price{font-weight:700;font-variant-numeric:tabular-nums}
.price-f{color:#6ee7b7}
.price-b{color:#fbbf24}
.price-p{color:#fca5a5}
.price-u{color:#f87171}
.tooltip{position:relative;cursor:help;border-bottom:1px dashed #475569}
.tooltip:hover::after{content:attr(data-tip);position:absolute;bottom:130%;left:50%;transform:translateX(-50%);background:#0f172a;color:#e2e8f0;padding:6px 10px;border-radius:6px;font-size:11px;white-space:nowrap;z-index:10;border:1px solid #334155}
.tooltip:hover::before{content:'';position:absolute;bottom:calc(130% - 6px);left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#334155}
@media(max-width:768px){
  .filters input{width:120px}
  .filters{gap:6px}
  .count{display:none}
  .update-panel{flex-direction:column}
  .update-panel input[type=password]{width:100%}
  .header{flex-direction:column;gap:8px}
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>LLM API Pricing &amp; Benchmarks</h1>
    <div class="sub">
      USD/1M tokens &bull; Cập nhật: <span id="lastUpdate">11/7/2026</span>
      <span class="updated" id="updateTimestamp"></span>
    </div>
  </div>
</div>

<div class="update-panel">
  <label for="geminiKey">Gemini API Key:</label>
  <input type="password" id="geminiKey" placeholder="AIza..." autocomplete="off">
  <button class="btn-update" id="btnUpdate" onclick="doUpdate()">Cập nhật</button>
  <span class="update-status" id="updateStatus"></span>
</div>

<div class="filters">
  <input type="text" id="search" placeholder="Tim model..." oninput="applyFilters()">
  <select id="tierFilter" onchange="applyFilters()">
    <option value="all">Tat ca tier</option>
    <option value="Budget">Budget (<$2)</option>
    <option value="Mid">Mid ($2-$7)</option>
    <option value="Premium">Premium ($8-$18)</option>
    <option value="Ultra">Ultra ($30-$60)</option>
    <option value="Free">Free ($0)</option>
  </select>
  <select id="visionFilter" onchange="applyFilters()">
    <option value="all">Vision: All</option>
    <option value="yes">Co Vision</option>
    <option value="no">Khong</option>
  </select>
  <select id="thinkingFilter" onchange="applyFilters()">
    <option value="all">Thinking: All</option>
    <option value="yes">Co Thinking</option>
    <option value="no">Khong</option>
  </select>
  <select id="toolFilter" onchange="applyFilters()">
    <option value="all">Tool Call: All</option>
    <option value="yes">Co Tool</option>
  </select>
  <select id="priceRange" onchange="applyFilters()">
    <option value="all">Khoang gia</option>
    <option value="under1"><$1/1M</option>
    <option value="1to3">$1-$3/1M</option>
    <option value="3to6">$3-$6/1M</option>
    <option value="6to15">$6-$15/1M</option>
    <option value="over15">>$15/1M</option>
  </select>
  <select id="sweFilter" onchange="applyFilters()">
    <option value="all">SWE-bench: All</option>
    <option value="high">>80%</option>
    <option value="mid">70-80%</option>
    <option value="low"><70%</option>
  </select>
  <select id="sortBy" onchange="applyFilters()">
    <option value="total-asc">Sap xep: Gia tang</option>
    <option value="total-desc">Gia giam</option>
    <option value="arena-desc">Arena giam</option>
    <option value="swe-desc">SWE giam</option>
    <option value="livecode-desc">LiveCode giam</option>
    <option value="aa-desc">AA giam</option>
    <option value="name">Ten A-Z</option>
  </select>
  <span class="count" id="count">34 models</span>
</div>

<div class="wrap">
<table id="tbl">
<thead>
<tr>
  <th onclick="sortTable(0)" class="active">Model <span class="sort">&#x25B4;&#x25BE;</span></th>
  <th onclick="sortTable(1)">Tier <span class="sort">&#x25B4;&#x25BE;</span></th>
  <th onclick="sortTable(2)">Tong/1M <span class="sort">&#x25B4;&#x25BE;</span></th>
  <th onclick="sortTable(3)">Input <span class="sort">&#x25B4;&#x25BE;</span></th>
  <th onclick="sortTable(4)">Output <span class="sort">&#x25B4;&#x25BE;</span></th>
  <th onclick="sortTable(5)" class="tooltip" data-tip="Doc duoc anh">Vis <span class="sort">&#x25B4;&#x25BE;</span></th>
  <th onclick="sortTable(6)" class="tooltip" data-tip="Suy luan sau">Think <span class="sort">&#x25B4;&#x25BE;</span></th>
  <th onclick="sortTable(7)" class="tooltip" data-tip="Goi function/tool">Tool <span class="sort">&#x25B4;&#x25BE;</span></th>
  <th onclick="sortTable(8)" class="tooltip" data-tip="Context window">Ctx <span class="sort">&#x25B4;&#x25BE;</span></th>
  <th onclick="sortTable(9)" class="tooltip" data-tip="Chatbot Arena Elo">Arena <span class="sort">&#x25B4;&#x25BE;</span></th>
  <th onclick="sortTable(10)" class="tooltip" data-tip="Sua bug GitHub that">SWE <span class="sort">&#x25B4;&#x25BE;</span></th>
  <th onclick="sortTable(11)" class="tooltip" data-tip="Competitive programming">LiveCode <span class="sort">&#x25B4;&#x25BE;</span></th>
  <th onclick="sortTable(12)" class="tooltip" data-tip="Artificial Analysis Index">AA <span class="sort">&#x25B4;&#x25BE;</span></th>
  <th>Provider</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<script>
const DATA = [
  // Budget
  ["DeepSeek V4 Flash","Budget",0.42,0.14,0.28,"Co","Co built-in","Co","1M",1380,"~70%","~85%","~38","DeepSeek",true],
  ["DeepSeek V4 Pro","Budget",1.30,0.435,0.87,"Khong","Co built-in","Co","1M",1400,"80.6%","~88%","44","DeepSeek",true],
  ["MiniMax M3","Budget",1.50,0.30,1.20,"Co","Co","Co","1M",1430,"80.5%","---","44","MiniMax",true],
  ["Qwen3.7 Plus","Budget",1.60,0.32,1.28,"Khong","Co","Co","1M",1420,"---","89.6%","---","Alibaba",false],
  ["Gemini 3.1 Flash-Lite","Budget",1.75,0.25,1.50,"Co","Khong","Co","1M","---","---","---","---","Google",false],
  // Mid
  ["Gemini 2.5 Flash","Mid",2.80,0.30,2.50,"Co","Co","Co","1M",1420,"~72%","~85%","~40","Google",false],
  ["Gemini 3 Flash","Mid",3.50,0.50,3.00,"Co","Co","Co","1M",1460,"75.8%","90.8%","~44","Google",true],
  ["Grok 4.3","Mid",3.75,1.25,2.50,"Co","Reasoning","Co","10M",1400,"---","---","---","xAI",false],
  ["GLM-5","Mid",4.20,1.00,3.20,"Khong","Co","Co","128K",1440,"72.8%","---","~42","Zhipu AI",false],
  ["Kimi K2.7 Code","Mid",4.95,0.95,4.00,"Khong","Co","Co","256K",1420,"~78%","---","---","Moonshot AI",false],
  ["Kimi K2.6","Mid",4.95,0.75,3.50,"Co","Co","Co","262K",1440,"80.2%","89.6%","---","Moonshot AI",true],
  ["Qwen3.7 Max","Mid",5.00,1.25,3.75,"Khong","Co","Co","1M",1450,"80.4%","91.6%","---","Alibaba",true],
  ["GLM-5V-Turbo","Mid",5.20,1.20,4.00,"Co","Co","Co","128K",1450,"---","---","---","Zhipu AI",false],
  ["GPT-5.4 mini","Mid",5.25,0.75,4.50,"Co","Co","Co","1M",1420,"~70%","---","~40","OpenAI",false],
  ["o4-mini","Mid",5.50,1.10,4.40,"Khong","Co built-in","Co","200K",1400,"~72%","---","~42","OpenAI",false],
  ["GLM-5.2","Mid",5.80,1.40,4.40,"Khong","Co","Co","128K",1490,"82.8%","---","51","Zhipu AI",true],
  ["Claude Haiku 4.5","Mid",6.00,1.00,5.00,"Co","Khong","Co","200K",1420,"~70%","---","~40","Anthropic",false],
  ["GPT-5.6 Luna","Mid",7.00,1.00,6.00,"Co","Co","Co","1M",1460,"~78%","---","~47","OpenAI",true],
  // Premium
  ["Grok 4.5","Premium",8.00,2.00,6.00,"Co","Co","Co","10M",1440,"86.6%","---","---","xAI",false],
  ["o3","Premium",10.00,2.00,8.00,"Khong","Co built-in","Co","200K",1420,"~75%","---","~45","OpenAI",false],
  ["Gemini 3.5 Flash","Premium",10.50,1.50,9.00,"Co","Co","Co","1M",1450,"---","---","---","Google",false],
  ["Gemini 2.5 Pro","Premium",11.25,1.25,10.00,"Co","Co","Co","2M",1440,"~78%","---","~48","Google",false],
  ["Claude Sonnet 5","Premium",12.00,2.00,10.00,"Co","High","Co","1M",1530,"85.2%","---","---","Anthropic",true],
  ["Gemini 3.1 Pro","Premium",14.00,2.00,12.00,"Co","Co","Co","1M",1485,"80.6%","---","~48","Google",false],
  ["GPT-5.6 Terra","Premium",17.50,2.50,15.00,"Co","Co","Co","1M",1470,"---","---","~50","OpenAI",false],
  ["GPT-5.4","Premium",17.50,2.50,15.00,"Co","Co","Co","1M",1470,"~78%","---","~46","OpenAI",false],
  ["Claude Sonnet 4.6","Premium",18.00,3.00,15.00,"Co","High","Co","200K",1480,"79.6%","---","---","Anthropic",false],
  // Ultra
  ["Claude Opus 4.6","Ultra",30.00,5.00,25.00,"Co","Co","Co","1M",1498,"75.6%","---","~50","Anthropic",false],
  ["Claude Opus 4.7","Ultra",30.00,5.00,25.00,"Co","Co","Co","1M",1503,"82.0%","---","~52","Anthropic",false],
  ["Claude Opus 4.8","Ultra",30.00,5.00,25.00,"Co","Co","Co","1M",1495,"88.6%","---","~55","Anthropic",false],
  ["GPT-5.6 Sol","Ultra",35.00,5.00,30.00,"Co","xHigh","Co","1M",1486,"96.2%","---","59","OpenAI",true],
  ["GPT-5.5","Ultra",35.00,5.00,30.00,"Co","High","Co","1M",1480,"82.6%","89.4%","~52","OpenAI",false],
  ["Claude Fable 5","Ultra",60.00,10.00,50.00,"Co","Adaptive","Co","1M",1509,"95.0%","---","60","Anthropic",true],
  // Free
  ["GLM-4.7-Flash","Free",0.00,0.00,0.00,"Khong","Khong","Co","128K",1320,"---","---","---","Zhipu AI",true],
];

function normalise(r) {
  return [
    r[0], r[1], parseFloat(r[2]), parseFloat(r[3]), parseFloat(r[4]),
    r[5] === "Co" ? "Co" : "Khong",
    r[6],
    r[7] === "Co" ? "Co" : "Khong",
    r[8], r[9], r[10], r[11], r[12], r[13], r[14]
  ];
}

let data = DATA.map(normalise);
const tierOrder = ["Free","Budget","Mid","Premium","Ultra"];

function displayTag(tier) {
  const cls = tier.toLowerCase();
  return '<span class="badge badge-' + cls + '">' + tier + '</span>';
}

function priceSpan(tier, val) {
  const cls = tier === "Free" ? "price-f" : tier === "Budget" ? "price-f" : tier === "Mid" ? "price-b" : tier === "Premium" ? "price-p" : "price-u";
  return '<span class="price ' + cls + '">$' + val.toFixed(2) + '</span>';
}

function render(rows) {
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";
  for (const r of rows) {
    const tr = document.createElement("tr");
    tr.className = "row-" + r[1].toLowerCase();
    if (r[14]) tr.classList.add("rec");
    const cols = [
      r[0], displayTag(r[1]), priceSpan(r[1], r[2]),
      "$" + r[3].toFixed(2), "$" + r[4].toFixed(2),
      r[5], r[6], r[7], r[8], r[9], r[10], r[11], r[12], r[13]
    ];
    for (const c of cols) {
      const td = document.createElement("td");
      td.innerHTML = c;
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
}

function applyFilters() {
  const search = document.getElementById("search").value.toLowerCase();
  const tier = document.getElementById("tierFilter").value;
  const vision = document.getElementById("visionFilter").value;
  const thinking = document.getElementById("thinkingFilter").value;
  const tool = document.getElementById("toolFilter").value;
  const price = document.getElementById("priceRange").value;
  const swe = document.getElementById("sweFilter").value;
  const sort = document.getElementById("sortBy").value;

  let f = data.filter(function(r) {
    if (search && r[0].toLowerCase().indexOf(search) < 0) return false;
    if (tier !== "all" && r[1] !== tier) return false;
    if (vision === "yes" && r[5] !== "Co") return false;
    if (vision === "no" && r[5] === "Co") return false;
    if (thinking === "yes" && r[6] === "Khong") return false;
    if (thinking === "no" && r[6] !== "Khong") return false;
    if (tool === "yes" && r[7] !== "Co") return false;
    if (price === "under1" && r[2] >= 1) return false;
    if (price === "1to3" && (r[2] < 1 || r[2] > 3)) return false;
    if (price === "3to6" && (r[2] < 3 || r[2] > 6)) return false;
    if (price === "6to15" && (r[2] < 6 || r[2] > 15)) return false;
    if (price === "over15" && r[2] <= 15) return false;
    if (swe === "high") { var v = parseFloat(r[10]); if (isNaN(v) || v <= 80) return false; }
    if (swe === "mid") { var v = parseFloat(r[10]); if (isNaN(v) || v < 70 || v > 80) return false; }
    if (swe === "low") { var v = parseFloat(r[10]); if (!isNaN(v) && v >= 70) return false; }
    return true;
  });

  var sf = sort.split("-")[0], sd = sort.split("-")[1];
  var si = {total:2, arena:9, swe:10, livecode:11, aa:12, name:0}[sf] || 2;
  f.sort(function(a, b) {
    var va = a[si], vb = b[si];
    if (typeof va === "string" && sf !== "name") {
      va = parseFloat(va) || 0;
      vb = parseFloat(vb) || 0;
    }
    if (sf === "name") return sd === "desc" ? (vb+"").localeCompare(va+"") : (va+"").localeCompare(vb+"");
    return sd === "desc" ? vb - va : va - vb;
  });

  if (sf === "total") {
    f.sort(function(a,b) { return tierOrder.indexOf(a[1]) - tierOrder.indexOf(b[1]) || a[2] - b[2]; });
  }

  render(f);
  document.getElementById("count").textContent = f.length + " models";
}

async function doUpdate() {
  var key = document.getElementById("geminiKey").value.trim();
  if (!key) { setStatus("Nhap Gemini API key truoc!", "error"); return; }

  var btn = document.getElementById("btnUpdate");
  btn.disabled = true;
  setStatus("Dang cap nhat...", "spin");

  try {
    var res = await fetch("/api/update", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ apiKey: key })
    });
    var result = await res.json();

    if (!res.ok) {
      setStatus("Loi: " + (result.error || res.statusText), "error");
      btn.disabled = false; return;
    }

    var nd = result.data;
    if (!nd || !nd.length) {
      setStatus("Gemini khong tra ve du lieu", "error");
      btn.disabled = false; return;
    }

    data = nd.map(function(r) {
      while (r.length < 15) r.push("");
      var row = r.slice(0, 14);
      if (typeof r[5] === "string") {
        if (r[5].toLowerCase() === "yes" || r[5].toLowerCase() === "co" || r[5] === "Co") row[5] = "Co";
        else row[5] = "Khong";
      }
      if (typeof r[7] === "string") {
        if (r[7].toLowerCase() === "yes" || r[7].toLowerCase() === "co" || r[7] === "Co") row[7] = "Co";
        else row[7] = "Khong";
      }
      if (typeof r[6] === "string") {
        if (r[6].toLowerCase() === "no" || r[6].toLowerCase() === "khong") row[6] = "Khong";
        else if (r[6] === "Khong") row[6] = "Khong";
      }
      var last = r[r.length - 1];
      row.push(last === "BEST" || last === true);
      row[2] = parseFloat(row[2]) || 0;
      row[3] = parseFloat(row[3]) || 0;
      row[4] = parseFloat(row[4]) || 0;
      return row;
    });

    var now = new Date();
    document.getElementById("lastUpdate").textContent = now.toLocaleString("vi-VN");
    document.getElementById("updateTimestamp").textContent = "(tu Gemini AI)";
    applyFilters();
    setStatus("Da cap nhat " + result.count + " models", "ok");
  } catch (err) {
    setStatus("Loi ket noi: " + err.message, "error");
  }
  btn.disabled = false;
}

function setStatus(msg, type) {
  var el = document.getElementById("updateStatus");
  el.textContent = msg;
  el.className = "update-status" + (type ? " " + type : "");
}

function sortTable(col) {
  var headers = document.querySelectorAll("#tbl th");
  headers.forEach(function(h) { h.classList.remove("active"); });
  headers[col].classList.add("active");
  var map = {0:"name",1:"total",2:"total",3:"total",4:"total",5:"name",6:"name",7:"name",
    8:"name",9:"arena-desc",10:"swe-desc",11:"livecode-desc",12:"aa-desc",13:"name"};
  document.getElementById("sortBy").value = map[col] || "total-asc";
  applyFilters();
}

document.getElementById("search").addEventListener("keydown", function(e) {
  if (e.key === "Escape") {
    document.getElementById("search").value = "";
    applyFilters();
  }
});

applyFilters();
</script>
</body>
</html>
